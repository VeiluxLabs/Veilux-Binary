name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: veilux

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64 (glibc)
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - label: Linux x86_64 (musl static)
            target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - label: Linux ARM64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - label: Windows x86_64
            target: x86_64-pc-windows-msvc
            os: windows-latest
          - label: macOS Intel
            target: x86_64-apple-darwin
            os: macos-latest
          - label: macOS Apple Silicon
            target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
          targets: ${{ matrix.target }}

      - name: Install cross tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo '[target.aarch64-unknown-linux-gnu]'
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> .cargo/config.toml

      - name: Build release binary
        run: cargo build --release --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          STAGING="${BIN_NAME}-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$STAGING/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$STAGING/" 2>/dev/null || true
          tar czf "${STAGING}.tar.gz" "$STAGING"
          shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          echo "ASSET=${STAGING}.tar.gz" >> "$GITHUB_ENV"
          echo "SUM=${STAGING}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "${{ github.event.inputs.tag }}" }
          $staging = "$env:BIN_NAME-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" $staging
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE $staging -ErrorAction SilentlyContinue
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          (Get-FileHash "$staging.zip" -Algorithm SHA256).Hash | Out-File "$staging.zip.sha256"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SUM=$staging.zip.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.SUM }}

  publish:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true

      - name: Extract changelog section for this tag
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="release-notes.md"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release ${GITHUB_REF_NAME}." > "$NOTES_FILE"
          fi
          {
            echo ""
            echo "---"
            echo "Full changelog: https://github.com/VeiluxLabs/Veilux-Binary/blob/main/CHANGELOG.md"
          } >> "$NOTES_FILE"
          echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (once)
        uses: softprops/action-gh-release@v2
        with:
          name: VEILUX ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.file }}
          files: artifacts/*
          fail_on_unmatched_files: false
