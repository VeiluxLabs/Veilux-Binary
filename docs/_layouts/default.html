<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ page.title | default: site.title }} — VEILUX</title>
<meta name="description" content="{{ page.description | default: site.description }}" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2356f0d0'/%3E%3Cstop offset='1' stop-color='%237c6cff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='32,4 58,32 32,60 6,32' fill='none' stroke='url(%23g)' stroke-width='4'/%3E%3Cpolygon points='32,18 46,32 32,46 18,32' fill='url(%23g)'/%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#070a10; --panel:rgba(255,255,255,.025); --panel-brd:rgba(255,255,255,.08);
    --txt:#eef2f7; --muted:#a3b1c2; --dim:#677488;
    --teal:#56f0d0; --green:#3ddc97; --violet:#7c6cff; --blue:#4d9fff; --amber:#ffc15e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth; -webkit-text-size-adjust:100%}
  body{
    background:var(--bg); color:var(--txt);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    line-height:1.7; -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
    background:
      radial-gradient(680px 540px at 12% -8%, rgba(124,108,255,.18), transparent 60%),
      radial-gradient(720px 560px at 88% 0%, rgba(86,240,208,.14), transparent 58%);
  }
  body::after{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.4;
    background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:54px 54px;
    mask-image:radial-gradient(circle at 50% 0%, #000 0%, transparent 70%);
    -webkit-mask-image:radial-gradient(circle at 50% 0%, #000 0%, transparent 70%);
  }
  a{color:var(--teal); text-decoration:none}
  a:hover{text-decoration:underline}

  /* nav (matches landing) */
  nav{position:sticky; top:0; z-index:60; backdrop-filter:saturate(160%) blur(14px);
      background:rgba(7,10,16,.72); border-bottom:1px solid var(--panel-brd)}
  nav .navwrap{max-width:1080px; margin:0 auto; padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:64px}
  .brand{display:flex; align-items:center; gap:11px; font-weight:800; letter-spacing:.4px; font-size:17px; color:var(--txt)}
  .brand:hover{text-decoration:none}
  .brand svg{width:28px; height:28px}
  .navlinks{display:flex; gap:26px; font-size:14.5px; font-weight:500; align-items:center}
  .navlinks a{color:var(--muted); transition:color .15s}
  .navlinks a:hover{color:var(--txt); text-decoration:none}
  .nav-cta{padding:8px 16px; border-radius:10px; background:var(--txt); color:#070a10 !important; font-weight:700; font-size:13.5px}
  @media(max-width:720px){.navlinks a:not(.nav-cta){display:none}}

  /* layout: content + breadcrumb */
  .page{max-width:840px; margin:0 auto; padding:46px 24px 90px}
  .crumb{font-size:13.5px; color:var(--dim); margin-bottom:28px}
  .crumb a{color:var(--muted)}

  /* markdown content */
  .md{font-size:16px; color:#d7e0ea}
  .md > *:first-child{margin-top:0}
  .md h1{font-size:clamp(30px,5vw,44px); font-weight:900; letter-spacing:-1.2px; line-height:1.1; margin:0 0 8px;
         background:linear-gradient(110deg,var(--teal),var(--violet) 75%); -webkit-background-clip:text; background-clip:text; color:transparent}
  .md h2{font-size:26px; font-weight:800; letter-spacing:-.5px; margin:46px 0 14px; padding-top:22px; border-top:1px solid var(--panel-brd)}
  .md h3{font-size:19.5px; font-weight:700; margin:32px 0 10px; color:var(--txt)}
  .md h4{font-size:16.5px; font-weight:700; margin:24px 0 8px; color:var(--muted)}
  .md p{margin:0 0 16px}
  .md ul,.md ol{margin:0 0 16px; padding-left:24px}
  .md li{margin:6px 0}
  .md li::marker{color:var(--teal)}
  .md strong{color:#fff; font-weight:700}
  .md hr{border:none; border-top:1px solid var(--panel-brd); margin:36px 0}
  .md img{max-width:100%; border-radius:12px; border:1px solid var(--panel-brd)}

  /* inline + block code */
  .md code{font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace; font-size:.88em;
       background:rgba(255,255,255,.07); padding:2px 7px; border-radius:6px; color:#9ff0df}
  .md pre{background:#06090e; border:1px solid var(--panel-brd); border-radius:14px; padding:18px 20px;
      overflow-x:auto; margin:0 0 20px; box-shadow:0 14px 40px rgba(0,0,0,.4)}
  .md pre code{background:none; padding:0; color:#c4d0de; font-size:13.5px; line-height:1.75}

  /* blockquote */
  .md blockquote{margin:0 0 20px; padding:14px 20px; border-left:3px solid var(--amber);
      background:rgba(255,193,94,.07); border-radius:0 12px 12px 0; color:#f0e0c2}
  .md blockquote p{margin:0}
  .md blockquote strong{color:var(--amber)}

  /* tables */
  .md table{width:100%; border-collapse:collapse; font-size:14.5px; margin:0 0 22px;
      border:1px solid var(--panel-brd); border-radius:12px; overflow:hidden}
  .md th,.md td{text-align:left; padding:12px 16px; border-bottom:1px solid var(--panel-brd)}
  .md th{background:rgba(255,255,255,.04); font-weight:600; color:var(--muted); font-size:13px; text-transform:uppercase; letter-spacing:.4px}
  .md tr:last-child td{border-bottom:none}
  .md td:first-child{color:var(--txt); font-weight:500}

  /* rouge syntax highlighting (dark) */
  .highlight .c,.highlight .cm,.highlight .c1,.highlight .cs{color:#5c6b7a;font-style:italic}
  .highlight .k,.highlight .kd,.highlight .kn,.highlight .kp,.highlight .kr,.highlight .kt{color:#7c6cff}
  .highlight .s,.highlight .s1,.highlight .s2,.highlight .sb,.highlight .sc,.highlight .sd,.highlight .se,.highlight .sh,.highlight .si,.highlight .sx,.highlight .sr{color:#3ddc97}
  .highlight .n,.highlight .na,.highlight .nb,.highlight .nc,.highlight .nf,.highlight .nn{color:#9ff0df}
  .highlight .nf,.highlight .nx{color:#4d9fff}
  .highlight .mi,.highlight .mf,.highlight .mh,.highlight .il,.highlight .m{color:#ffc15e}
  .highlight .o,.highlight .ow,.highlight .p{color:#a3b1c2}
  .highlight .nt{color:#56f0d0}
  .highlight .err{color:#ff7b72}

  footer{border-top:1px solid var(--panel-brd); padding:36px 0}
  footer .fwrap{max-width:840px; margin:0 auto; padding:0 24px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:14px; align-items:center; color:var(--dim); font-size:13.5px}
  footer a{color:var(--muted)}
  .backtop{display:inline-flex; align-items:center; gap:7px; margin-top:40px; padding:10px 18px;
      border:1px solid var(--panel-brd); border-radius:10px; background:var(--panel); color:var(--muted); font-size:14px; font-weight:500}
  .backtop:hover{border-color:rgba(86,240,208,.5); color:var(--txt); text-decoration:none}
</style>
</head>
<body>

<nav><div class="navwrap">
  <a class="brand" href="{{ '/' | relative_url }}">
    <svg viewBox="0 0 64 64"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#56f0d0"/><stop offset="1" stop-color="#7c6cff"/></linearGradient></defs><polygon points="32,4 58,32 32,60 6,32" fill="none" stroke="url(#bg)" stroke-width="4"/><polygon points="32,18 46,32 32,46 18,32" fill="url(#bg)"/></svg>
    VEILUX
  </a>
  <div class="navlinks">
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/INSTALL.html' | relative_url }}">Install</a>
    <a href="{{ '/architecture.html' | relative_url }}">Architecture</a>
    <a href="{{ '/security.html' | relative_url }}">Security</a>
    <a class="nav-cta" href="https://github.com/VeiluxLabs/Veilux-Binary">GitHub ↗</a>
  </div>
</div></nav>

<main class="page">
  <div class="crumb"><a href="{{ '/' | relative_url }}">VEILUX</a> &nbsp;/&nbsp; Docs</div>
  <article class="md">
    {{ content }}
  </article>
  <a class="backtop" href="{{ '/' | relative_url }}">← Back to home</a>
</main>

<footer><div class="fwrap">
  <a class="brand" href="{{ '/' | relative_url }}" style="font-size:15px">
    <svg viewBox="0 0 64 64" style="width:22px;height:22px"><defs><linearGradient id="fg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#56f0d0"/><stop offset="1" stop-color="#7c6cff"/></linearGradient></defs><polygon points="32,4 58,32 32,60 6,32" fill="none" stroke="url(#fg)" stroke-width="4"/><polygon points="32,18 46,32 32,46 18,32" fill="url(#fg)"/></svg>
    VEILUX
  </a>
  <div>Dual-licensed <a href="https://github.com/VeiluxLabs/Veilux-Binary/blob/main/LICENSE-MIT">MIT</a> /
  <a href="https://github.com/VeiluxLabs/Veilux-Binary/blob/main/LICENSE-APACHE">Apache-2.0</a></div>
</div></footer>

</body>
</html>
