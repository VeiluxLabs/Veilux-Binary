<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEILUX Explorer</title>
  <meta name="description" content="Block explorer for the VEILUX blockchain" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="#/">
        <span class="brand-logo">◆</span>
        <span class="brand-name">VEILUX</span>
        <span class="brand-tag">Explorer</span>
      </a>
      <div class="nav-search">
        <input id="navSearch" type="text" placeholder="Search by block / hash / command id" spellcheck="false" />
        <button id="navSearchBtn" aria-label="Search">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5Zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14Z"/></svg>
        </button>
      </div>
      <div class="nav-right">
        <div class="endpoint-wrap">
          <input id="endpoint" type="text" spellcheck="false" />
          <button id="connectBtn">Connect</button>
        </div>
        <span id="statusDot" class="status-dot offline" title="offline"></span>
      </div>
    </div>
  </header>

  <div id="view-home" class="view">
    <section class="hero">
      <div class="hero-inner">
        <h1>VEILUX Blockchain Explorer</h1>
        <p>Inspect blocks, transactions, events, and on-chain state in real time.</p>
      </div>
    </section>

    <main class="container">
      <section class="stat-row" id="statRow">
        <div class="stat-card skeleton"></div>
        <div class="stat-card skeleton"></div>
        <div class="stat-card skeleton"></div>
        <div class="stat-card skeleton"></div>
      </section>

      <div class="grid-2">
        <section class="panel">
          <div class="panel-head">
            <h2>Latest Blocks</h2>
            <span class="live-dot" id="liveDot" title="live via WebSocket"></span>
          </div>
          <div id="latestBlocks" class="rows"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Latest Transactions</h2>
            <select id="prismFilter" class="select"></select>
          </div>
          <div id="latestTxns" class="rows"></div>
        </section>
      </div>

      <section class="panel">
        <div class="panel-head">
          <h2>State Browser</h2>
          <div class="state-controls">
            <input id="statePrefix" type="text" value="token/meta/" spellcheck="false" />
            <button id="stateBtn" class="btn-sm">Query</button>
          </div>
        </div>
        <div id="stateList" class="rows mono"></div>
      </section>
    </main>
  </div>

  <div id="view-detail" class="view hidden">
    <main class="container">
      <a class="back" href="#/">← Back to explorer</a>
      <div id="detail"></div>
    </main>
  </div>

  <footer class="footer">
    <div class="container footer-inner">
      <span>VEILUX Explorer · connects to a <code>veilux serve</code> node</span>
      <a href="https://github.com/VeiluxLabs/Veilux-Binary" target="_blank" rel="noopener">GitHub ↗</a>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
